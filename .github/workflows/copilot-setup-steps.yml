name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      CARGO_INSTA_VERSION: "1.47.2"
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache cargo-insta binary
        id: cache-cargo-insta
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-insta
          key: ${{ runner.os }}-cargo-insta-${{ env.CARGO_INSTA_VERSION }}

      - name: Install cargo-insta
        if: steps.cache-cargo-insta.outputs.cache-hit != 'true'
        run: cargo install cargo-insta --locked --version "$CARGO_INSTA_VERSION"
